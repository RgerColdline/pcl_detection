# ============================================================================
# 节点级参数（话题、跳帧等）
# ============================================================================
input_topic: "/livox/lidar"
result_topic: "/pcl_detection/result"
objects_topic: "/pcl_detection/objects"
skip_frames: 0

# ============================================================================
# 全局处理开关（可被其他节点动态修改）
# ============================================================================
# 设置为 false 时，节点将跳过点云处理，直接返回空结果
# 其他节点可通过 `rosparam set enable_pcl_processing false/true` 动态控制
enable_pcl_processing: true

# ============================================================================
# 日志控制参数
# ============================================================================
# 日志输出频率控制（两种方式选一）：
# 方式 1：基于帧数 - 每 N 帧输出一次日志（0=每次都输出，19=每 20 帧输出 1 次）
log_skip_frames: 19
# 方式 2：基于时间 - 每 N 秒输出一次（0=禁用，2.0=每 2 秒输出一次）
log_interval_sec: 2.0
# Livox 日志级别：0=无，1=摘要，2=详细
livox_debug_level: 1  # 降低为 1，减少详细日志
# ROS 日志级别：DEBUG/INFO/WARN/ERROR/FATAL
ros_log_level: "INFO"

# ============================================================================
# 时间测量配置
# ============================================================================
timing:
  enable: true
  downsample: true
  walls: true
  cylinders: true
  circles: true
  total: true

# ============================================================================
# 下采样配置
# ============================================================================
# 下采样会显著减少点云数量，提升处理速度但降低精度
# leaf_size 越大，下采样越激进，点云越少，速度越快
# 建议值：0.05-0.08（平衡），0.08-0.12（快速），>0.12（极速但可能检测不到物体）
downsample_config:
  approx: true  # true=ApproximateVoxelGrid(更快精度略低), false=VoxelGrid(标准)
  leaf_size: 0.08  # 下采样网格大小（米）

# ============================================================================
# 墙体检测配置
# ============================================================================
wall_extraction:
  enable: true  #是否启用检测墙体
  using_normal: true  #是否使用法线信息
  distance_threshold: 0.04  #距离阈值,越低越严格
  min_inliers: 1500  #点数阈值，低于这个点数的平面不算在内
  angle_threshold: 15.0 #角度阈值，单位度，平面法线与垂直方向的夹角必须小于这个值才算墙体
  axis: [0, 0, 1]  #参考的与墙面平行的向量

# ============================================================================
# 圆柱检测配置
# ============================================================================
cylinder_extraction:
  enable: true  #是否启用检测圆柱
  using_normal: false  #是否使用法线信息（建议使用，可提高检测精度）
  distance_threshold: 0.02  #距离阈值，点到圆柱模型的最大允许距离
  min_inliers: 100  #点数阈值，圆柱内点数量必须大于此值
  radius_min: 0.1  #最小半径（米），小于此半径的圆柱不会被检测
  radius_max: 1  #最大半径（米），大于此半径的圆柱不会被检测
  axis: [0, 0, 1]  #圆柱轴向参考向量，用于约束圆柱方向
  eps_angle: 25.0  #角度容差（度），圆柱轴向与参考轴的最大允许夹角

# ============================================================================
# 圆环检测配置
# ============================================================================
circle_extraction:
  enable: false  #是否启用检测圆环
  using_normal: false  #是否使用法线信息（建议使用，可提高检测精度）
  distance_threshold: 0.03  #距离阈值，点到圆环模型的最大允许距离
  min_inliers: 80  #点数阈值，圆环内点数量必须大于此值
  radius_min: 0.2  #最小半径（米），小于此半径的圆环不会被检测
  radius_max: 0.7  #最大半径（米），大于此半径的圆环不会被检测
  plane_distance_threshold: 0.06  #平面提取距离阈值，用于提取圆环所在平面
  plane_angle_threshold: 45.0  #平面角度阈值（度），平面法线与垂直方向的最大夹角
  plane_normal_z_max: 0.7  #平面法向量 Z 分量最大值，用于筛选竖直平面
  min_coverage_angle: 240.0  #最小覆盖角度（度），圆环必须覆盖至少这么多角度
  ransac_iterations: 200  #RANSAC 迭代次数，越高越准确但越慢
  max_circles: 3  #最大检测圆环数量
  normal_tolerance: 0.5  #法向量容差，用于验证圆环法向量方向

# ============================================================================
# 矩形框检测配置（原 Pipeline：墙体 + 圆柱 + 圆环 + 矩形框）
# ============================================================================
# 注意：这是原 Pipeline 的配置，使用 RANSAC 矩形拟合算法
# 如果使用新 Pipeline（use_obstacle_pipeline: true），此配置被忽略
# ============================================================================
rectangle_extraction:
  enable: true  #是否启用检测矩形框（方环）[默认关闭，需要时开启]
  using_normal: false  #是否使用法线信息（建议使用，可提高检测精度）
  distance_threshold: 0.05  #距离阈值，点到矩形边的最大允许距离（增大提高容错）
  min_inliers: 300  #点数阈值，矩形内点数量必须大于此值（增大减少误检）
  length_min: 0.8  #最小长度（米），小于此长度的矩形不会被检测（增大过滤小物体）
  length_max: 2.5  #最大长度（米），大于此长度的矩形不会被检测
  width_min: 0.5  #最小宽度（米），小于此宽度的矩形不会被检测（增大过滤窄物体）
  width_max: 1.5  #最大宽度（米），大于此宽度的矩形不会被检测
  plane_distance_threshold: 0.08  #平面提取距离阈值，用于提取矩形所在平面（增大提高容错）
  plane_angle_threshold: 30.0  #平面角度阈值（度），平面法线与垂直方向的最大夹角（减小更严格）
  plane_normal_z_max: 0.5  #平面法向量 Z 分量最大值，用于筛选竖直平面（减小更严格）
  coverage_threshold: 0.5  #最小边覆盖比例，矩形边上的点必须占总点的这个比例（增大减少误检）
  ransac_iterations: 200  #RANSAC 迭代次数，越高越准确但越慢（减小提升速度）
  max_rectangles: 3  #最大检测矩形数量（减小提升速度）

# ============================================================================
# 其他配置
# ============================================================================
save_objects: false #是否保存检测到的对象点云
output_dir: "/home/jetson/detected_objects"

# ============================================================================
# 点云发布配置（RViz 可视化）
# ============================================================================
# 设置为 true 时，发布下采样后的点云到 /pcl_detection/pointcloud 话题
# 在 RViz 中添加 PointCloud2 类型，话题选择 /pcl_detection/pointcloud 即可看到点云
publish_cloud: true

# 点云数量阈值（低于此阈值的点云不发布，减少 RViz 负担）
min_cloud_points: 10

# ============================================================================
# 点云采样配置（points_samples 节点专用）
# ============================================================================
points_sample_config:
  enable_livox_callback: true # 是否启用 Livox 点云回调
  save_sample_param: "/livox/save_sample" # 触发保存的 ROS 参数名称

# ============================================================================
# 障碍物 Pipeline 配置（新 Pipeline：地面分割 + 墙体 + 方环 + 聚类）
# ============================================================================
# 使用方式：在 launch 文件中设置 use_obstacle_pipeline: true
# ============================================================================
use_obstacle_pipeline: true  # 设置为 true 启用新 Pipeline

# ----------------------------------------------------------------------------
# 新 Pipeline 下采样配置
# ----------------------------------------------------------------------------
obstacle_pipeline:
  # 坐标系转换配置
  transform_config:
    enable: true              # 是否启用从无人机系到世界系的转换
    pose_topic: "/mavros/local_position/pose"  # 无人机位姿话题
    frame_id: "world"          # 世界坐标系名称

  downsample_config:
    approx: true  # true=ApproximateVoxelGrid(更快), false=VoxelGrid(标准)
    leaf_size: 0.08  # 下采样网格大小（米）

  # 地面分割配置
  ground_config:
    enable: false
    distance_threshold: 0.05  # RANSAC 距离阈值
    max_iterations: 100  # RANSAC 最大迭代次数
    normal_z_min: 0.8  # 地面法向量 Z 分量最小值（约束法向量接近 Z 轴）
    normal_z_max: 1.0  # 地面法向量 Z 分量最大值

  # 墙体检测配置（新 Pipeline 专用）
  wall_config:
    enable: true
    using_normal: false
    distance_threshold: 0.04
    min_inliers: 500      # 点数阈值 [降低到 500，因为下采样后点数减少]
    angle_threshold: 15.0  # 法线与垂直方向夹角阈值（度）
    axis: [0, 0, 1]  # 参考向量

  # 方环检测配置（新 Pipeline 专用：基于聚类 + 角点检测）
  # 注意：这是新 Pipeline 的配置，使用聚类 + 角点检测算法，支持中空检测
  rectangle_config:
    enable: true
    using_normal: false
    distance_threshold: 0.05
    min_inliers: 70
    length_min: 0.5
    length_max: 2.5
    width_min: 0.4
    width_max: 1.5
    plane_distance_threshold: 0.08
    plane_angle_threshold: 30.0
    plane_normal_z_max: 0.5
    coverage_threshold: 0.5
    ransac_iterations: 200
    max_rectangles: 3
    hollow_ratio_threshold: 0.5  #中空比例阈值（0-1，越大要求越中空，建议 0.3-0.5）

  # 聚类配置
  cluster_config:
    enable: true
    cluster_tolerance: 0.1   # 聚类距离阈值（米）[增大到 0.5，让方环的顶部和腿能聚在一起]
    min_cluster_size: 50    # 最小簇点数 [降低到 30，允许检测较小的方环]
    max_cluster_size: 1000 # 最大簇点数

  # OBB 包围盒配置
  obb_config:
    inflation_radius: 0.0  # 膨胀半径（米）
    min_obstacle_height: 0.2  # 最小障碍物高度（米）

  # 时间测量配置
  timing_config:
    enable: true
    downsample: true
    ground: true
    wall: true
    rectangle: true
    cluster: true
    obb: true
    total: true
